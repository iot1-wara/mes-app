version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: mes_db
    restart: always
    environment:
      POSTGRES_USER: mes_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_in_production}
      POSTGRES_DB: mes_production
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
