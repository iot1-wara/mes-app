version: '3.8'

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: mes_db
    restart: always
    environment:
      POSTGRES_USER: mes_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_in_production}
      POSTGRES_DB: mes_production
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mes_app
    restart: always
    depends_on:
      postgres:
        condition: service_started
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: mes_admin
      DB_DATABASE: mes_production
      DB_PASSWORD: ${DB_PASSWORD:-change_me_in_production}
      JWT_SECRET: ${JWT_SECRET:-default-secret-change-in-production}
      JWT_EXPIRES_IN: "3600"
    ports:
      - "3000:3000"
    volumes:
      - app_logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

volumes:
  postgres_data:
  app_logs:
